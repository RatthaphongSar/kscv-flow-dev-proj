<!DOCTYPE html>
<html>
<head>
  <title>KVC Login Test</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
    .success { background: #d4edda; }
    .error { background: #f8d7da; }
    button { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>KVC Login Test</h1>
  
  <button onclick="testLogin()">Test Login (teacher)</button>
  <button onclick="testRefresh()">Test Refresh</button>
  <button onclick="testGetMe()">Test Get Me</button>
  <button onclick="showCookies()">Show Cookies</button>
  <button onclick="clearCookies()">Clear Cookies</button>

  <div id="result"></div>

  <script>
    const API_BASE = 'http://localhost:4001/api';

    function log(message, isError = false) {
      const result = document.getElementById('result');
      const div = document.createElement('div');
      div.className = 'result ' + (isError ? 'error' : 'success');
      div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong><br>` + 
                      (typeof message === 'string' ? message : JSON.stringify(message, null, 2)).replace(/\n/g, '<br>');
      result.appendChild(div);
    }

    async function testLogin() {
      try {
        log('Logging in...', false);
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'teacher', password: 'password123' }),
          credentials: 'include'
        });
        
        const data = await res.json();
        log(`Login Response (${res.status}):<br>${JSON.stringify(data, null, 2)}`, !res.ok);
        
        if (res.ok) {
          log('Cookies after login: ' + document.cookie, false);
        }
      } catch (e) {
        log('Error: ' + e.message, true);
      }
    }

    async function testRefresh() {
      try {
        log('Refreshing...', false);
        const res = await fetch(`${API_BASE}/auth/refresh`, {
          method: 'POST',
          credentials: 'include'
        });
        
        const data = await res.json();
        log(`Refresh Response (${res.status}):<br>${JSON.stringify(data, null, 2)}`, !res.ok);
      } catch (e) {
        log('Error: ' + e.message, true);
      }
    }

    async function testGetMe() {
      try {
        log('Getting /me...', false);
        const res = await fetch(`${API_BASE}/auth/me`, {
          credentials: 'include'
        });
        
        const data = await res.json();
        log(`Auth Me Response (${res.status}):<br>${JSON.stringify(data, null, 2)}`, !res.ok);
      } catch (e) {
        log('Error: ' + e.message, true);
      }
    }

    function showCookies() {
      log('Current Cookies:<br>' + (document.cookie || '(none)'), false);
    }

    function clearCookies() {
      document.cookie = 'access_token=; path=/; max-age=0';
      document.cookie = 'refresh_token=; path=/; max-age=0';
      log('Cookies cleared', false);
    }
  </script>
</body>
</html>
