
<!doctype html>
<html lang="th" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSVC Connect</title>
  </head>
  <body class="h-full m-0 p-0 bg-[#F5F9FF] text-slate-900">
    <div id="root" class="h-full"></div>
    <script>
      (function () {
        const interval = 15000
        let lastMtime = null
        const check = async () => {
          try {
            const res = await fetch('/__build', { cache: 'no-store' })
            if (!res.ok) return
            const data = await res.json()
            if (lastMtime && data.mtime && data.mtime !== lastMtime) {
              location.reload()
              return
            }
            if (data.mtime) lastMtime = data.mtime
          } catch (_) {}
        }
        check()
        setInterval(check, interval)
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
