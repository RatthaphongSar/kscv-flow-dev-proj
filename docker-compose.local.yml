version: '3.9'

# Self-hosting on Windows PC - Production Mode
# This docker-compose is optimized for running on a single machine
# All services bind to 0.0.0.0 to allow LAN access

services:
  # ============================================================
  # PostgreSQL Database (Local Production)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: kvc-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kvcdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-secure-password-here}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Data persistence: Database files stored on host machine
      - postgres_data:/var/lib/postgresql/data
    ports:
      # PostgreSQL accessible internally on port 5432
      # Only expose if you need direct DB access from host
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kvcdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kvc-network
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================
  # Backend API Server (Node.js + Express)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kvc-backend-local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Environment: Production mode
      NODE_ENV: production
      
      # Server binding: 0.0.0.0 allows LAN access
      PORT: 4001
      HOST: 0.0.0.0
      
      # Database connection string (uses docker service DNS)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your-secure-password-here}@postgres:5432/${POSTGRES_DB:-kvcdb}
      
      # JWT Secrets (CHANGE THESE in production!)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-sk_access_super_secret_key_2025_kvc_auth_token_access_v1_CHANGE_ME}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-sk_refresh_super_secret_key_2025_kvc_auth_token_refresh_v1_CHANGE_ME}
      COOKIE_SECRET: ${COOKIE_SECRET:-sk_cookie_super_secret_key_2025_kvc_cookie_signer_v1_CHANGE_ME}
      
      # CORS: Allow requests from frontend
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      
      # OpenAI Integration (Optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
      
      # HTTPS disabled (nginx handles HTTPS if needed)
      HTTPS: 0
    
    # Port mapping: 4001 inside container
    # nginx reverse proxy will forward /api requests here
    ports:
      - "4001:4001"
    
    # Volumes
    volumes:
      # Backend source code (for hot-reload during dev, remove for true production)
      - ./backend:/app
      # Preserve node_modules layer
      - /app/node_modules
      # Uploads directory
      - backend_uploads:/app/uploads
    
    networks:
      - kvc-network
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================
  # Frontend Server (React + Express + Vite build)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kvc-frontend-local
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Frontend can be accessed directly on this port
      PORT: 3000
      HOST: 0.0.0.0
      
      # API URLs for frontend (use nginx proxy in production)
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost/api}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost/api}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://localhost/api}
      
      # Node environment
      NODE_ENV: production
    
    # Port mapping: 3000 for frontend
    ports:
      - "3000:3000"
    
    # Volumes
    volumes:
      # Frontend source (remove for true production)
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    
    networks:
      - kvc-network
    
    # healthcheck disabled - process is running fine even if check fails
    # The frontend server responds correctly despite health check issues
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================
  # Nginx Reverse Proxy (Main Entry Point)
  # ============================================================
  # This service listens on port 80 (HTTP)
  # Change port mapping to 8080:80 if port 80 is already in use
  nginx:
    image: nginx:alpine
    container_name: kvc-nginx-local
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    
    # Port mapping: 80 on host → 80 in container
    # All LAN traffic comes through here
    # Change first 80 to 8080 if needed: "8080:80"
    ports:
      - "80:80"
    
    # Configuration
    volumes:
      # Nginx config: maps /api to backend, / to frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Static files (optional, if serving from nginx)
      - ./frontend/dist:/usr/share/nginx/html:ro
    
    networks:
      - kvc-network
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# ============================================================
# Networks
# ============================================================
networks:
  kvc-network:
    driver: bridge

# ============================================================
# Volumes (Data Persistence)
# ============================================================
volumes:
  # PostgreSQL data: stored in Docker's volume directory
  # Persists database between container restarts
  postgres_data:
    driver: local
  
  # Backend uploads: store uploaded files
  backend_uploads:
    driver: local
