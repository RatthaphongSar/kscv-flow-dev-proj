services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kvc-postgres
    environment:
      POSTGRES_DB: kvcdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-secure-password-here}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kvcdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kvc-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kvc-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis2025!}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis2025!} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kvc-network

  # KSVC Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ksvc-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-your-secure-password-here}@postgres:5432/kvcdb
      
      # Backend server
      PORT: 4001
      HOST: 0.0.0.0
      NODE_ENV: production
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis2025!}@redis:6379
      
      # JWT & Secrets
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-to-a-long-random-string-in-production}
      
      # OpenAI API (if used)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      
      # Frontend URL (for CORS)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://backend:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ksvc-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # KSVC Frontend (Node server serving built React app)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ksvc-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://backend:4001/api}
      PORT: 3000
    ports:
      - "80:3000"
    restart: unless-stopped
    networks:
      - ksvc-network

  # Nginx Reverse Proxy (entry point)
  nginx:
    image: nginx:alpine
    container_name: kvc-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      # Uncomment for HTTPS (after you have SSL certificates)
      # - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://nginx:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kvc-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  kvc-network:
    driver: bridge
