# Nginx Configuration for KVC Self-Hosted Setup
# Reverse Proxy for Frontend + Backend
# Listens on port 80 (HTTP)
# 
# Architecture:
# - nginx (reverse proxy) listens on 0.0.0.0:80
# - Routes / to frontend:3000
# - Routes /api to backend:4001
# - Serves static files if needed
# - Handles gzip compression
# - Rate limiting

# ============================================================
# Upstream Backends
# ============================================================
# These reference the Docker service names from docker-compose.yml
upstream backend {
    # Backend API service
    server backend:4001;
    keepalive 32;
}

upstream frontend {
    # Frontend server
    server frontend:3000;
    keepalive 32;
}

# ============================================================
# Server Block - Main HTTP Server
# ============================================================
server {
    # Listen on all interfaces (0.0.0.0) on port 80
    # This allows access from your LAN (e.g., http://192.168.x.x)
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Server name (any - this is the default catch-all)
    server_name _;
    
    # Client upload size limit
    client_max_body_size 50M;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Enable gzip compression for text responses
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;
    gzip_min_length 1000;
    gzip_comp_level 6;
    
    # ========================================================
    # Health Check Endpoint
    # ========================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ========================================================
    # API Routes → Backend Service
    # ========================================================
    # All requests to /api/* are forwarded to backend:4001
    location /api/ {
        # Proxy settings
        proxy_pass http://backend;
        
        # Preserve original host header
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (for Socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering settings
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # ========================================================
    # Socket.io WebSocket Routes
    # ========================================================
    # These may be on /socket.io or similar paths
    location /socket.io {
        proxy_pass http://backend;
        
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ========================================================
    # Static Files → Nginx or Frontend Service
    # ========================================================
    # Serve static assets (JS, CSS, images) with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Try to serve from nginx's /usr/share/nginx/html first (if populated)
        try_files $uri @frontend;
        
        # If found, set cache headers
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # ========================================================
    # Frontend Routes → Frontend Service
    # ========================================================
    # All other requests go to the frontend (React Router handles them)
    location / {
        proxy_pass http://frontend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Support SPA routing (cache busting with ?v=xxx)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Fallback to frontend for SPA routing
    location @frontend {
        proxy_pass http://frontend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ========================================================
    # Error Pages
    # ========================================================
    # Redirect 404 errors to frontend (for SPA routing)
    error_page 404 =200 /;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
